name: Azure Frontend Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/azure-frontend-deploy.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend for Azure
        env:
          VITE_BACKEND_ORIGIN: ${{ vars.AZURE_FRONTEND_BACKEND_ORIGIN }}
        run: npm run build

      - name: Assemble frontend deployment package
        run: |
          mkdir -p deploy_package
          cp -R dist scripts deploy_package/
          cp package.json package-lock.json deploy_package/

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-deploy-package
          path: frontend/deploy_package

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-deploy-package
          path: frontend_deploy

      - name: Deploy frontend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_FRONTEND_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_FRONTEND_WEBAPP_PUBLISH_PROFILE }}
          package: frontend_deploy
