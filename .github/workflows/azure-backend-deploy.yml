name: Azure Backend Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "config/**"
      - "scripts/start_backend.sh"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/azure-backend-deploy.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync Python dependencies from uv.lock
        run: uv sync --frozen --extra dev

      - name: Export requirements.txt for Azure build
        run: uv export --frozen --no-hashes --output-file requirements.txt

      - name: Assemble backend deployment package
        run: |
          mkdir -p backend_deploy
          cp -R app config scripts backend_deploy/
          cp pyproject.toml requirements.txt backend_deploy/

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-deploy-package
          path: backend_deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-deploy-package
          path: backend_deploy

      - name: Deploy backend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_BACKEND_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_BACKEND_WEBAPP_PUBLISH_PROFILE }}
          package: backend_deploy
